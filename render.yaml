services:
  - type: web
    name: amity-apparel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:////opt/render/project/src/instance/amity_apparel.db
    disk:
      name: app-data
      mountPath: /opt/render/project/src/instance
